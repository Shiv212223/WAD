<!DOCTYPE html>
<html>
<head>
    <title>User List</title>
</head>
<body>

    <h2>Registered Users</h2>

    <table border="1" cellpadding="10">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
            </tr>
        </thead>

        <tbody id="data"></tbody>
    </table>

    <script>
        let users = JSON.parse(localStorage.getItem("users")) || "";

        let output = "";

        users.forEach(function(user) {
            output += `
                <tr>
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                </tr>
            `;
        });

        document.getElementById("data").innerHTML = output;
    </script>

</body>
</html>
