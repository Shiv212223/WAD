<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
        }

        .box{
            width:300px;
            margin:100px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input{
            width:100%;
            padding:8px;
            margin-top:5px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:10px;
            background:blue;
            color:white;
            border:none;
            border-radius:5px;
        }

        h2{
            text-align:center;
        }
    </style>
</head>
<body>

    <h2>User Registration</h2>

    <form id="regForm">
        Name:
        <input type="text" id="name" required><br><br>

        Email:
        <input type="email" id="email" required><br><br>

        <button type="submit">Register</button>
    </form>

    <script>
        $("#regForm").submit(function(e) {
            e.preventDefault();

            let user = {
                name: $("#name").val(),
                email: $("#email").val()
            };

            // Get old data
            let users = JSON.parse(localStorage.getItem("users")) || [];

            // Push new user
            users.push(user);

            // Save again
            localStorage.setItem("users", JSON.stringify(users));

            // AJAX POST
            $.ajax({
                url: "https://jsonplaceholder.typicode.com/posts",
                type: "POST",
                data: user,
                success: function() {
                    alert("Registered Successfully");
                    window.location = "display.html";
                }
            });
        });
    </script>

</body>
</html>
